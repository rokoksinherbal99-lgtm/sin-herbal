<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.9)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.5)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)" rx="0"/>
  <circle cx="450" cy="130" r="180" fill="rgba(255,255,255,0.06)"/>
  <circle cx="150" cy="500" r="140" fill="rgba(255,255,255,0.04)"/>
  <g transform="translate(300,260)">
    <path d="M-50,30 Q-60,-20 -30,-40 Q-10,-55 0,-30 Q10,-55 30,-40 Q60,-20 50,30 Z" fill="url(#leaf)" filter="url(#shadow)"/>
    <line x1="0" y1="-25" x2="0" y2="45" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <path d="M-20,0 Q0,-10 20,0" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>
  <g transform="translate(300,400)" filter="url(#shadow)">
    <text x="0" y="0" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="28" fill="white" text-anchor="middle" letter-spacing="2">TEH HERBAL SIN</text>
    <text x="0" y="28" font-family="Arial,Helvetica,sans-serif" font-weight="300" font-size="15" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">NIKMATI KESEGARAN ALAMI</text>
  </g>
  <g transform="translate(300,480)">
    <text x="0" y="0" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" text-anchor="middle">MINUMAN HERBAL</text>
  </g>
</svg>