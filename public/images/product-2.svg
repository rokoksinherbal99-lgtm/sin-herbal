<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="pack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F9F6F0"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)" rx="0"/>
  <circle cx="500" cy="100" r="220" fill="rgba(255,255,255,0.04)"/>
  <circle cx="100" cy="500" r="180" fill="rgba(255,255,255,0.03)"/>
  <g transform="translate(300,280)" filter="url(#shadow)">
    <rect x="-100" y="-120" width="200" height="240" rx="12" fill="url(#pack)"/>
    <rect x="-100" y="-120" width="200" height="100" rx="12" fill="url(#ribbon)" opacity="0.15"/>
    <rect x="-85" y="-105" width="170" height="60" rx="6" fill="url(#ribbon)"/>
    <text x="0" y="-72" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="22" fill="white" text-anchor="middle" letter-spacing="1">SIN HERBAL</text>
    <text x="0" y="-50" font-family="Arial,Helvetica,sans-serif" font-weight="300" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="3">MENTHOL</text>
    <line x1="-70" y1="-20" x2="70" y2="-20" stroke="#BFDBFE" stroke-width="1"/>
    <text x="0" y="10" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="16" fill="#1e3a5f" text-anchor="middle">Rokok Herbal</text>
    <text x="0" y="35" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle">Menthol Fresh</text>
    <rect x="-40" y="55" width="80" height="24" rx="4" fill="#BFDBFE"/>
    <text x="0" y="71" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="11" fill="#1e3a5f" text-anchor="middle">20 Batang</text>
    <line x1="-70" y1="95" x2="70" y2="95" stroke="#BFDBFE" stroke-width="1"/>
    <text x="0" y="115" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">PRODUK TERDAFTAR BEA CUKAI</text>
  </g>
  <g transform="translate(300,510)">
    <text x="0" y="0" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle">Dilarang dijual kepada di bawah 21 tahun</text>
  </g>
</svg>
