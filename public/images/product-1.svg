<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.9)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.5)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)" rx="0"/>
  <circle cx="450" cy="130" r="180" fill="rgba(255,255,255,0.06)"/>
  <circle cx="150" cy="500" r="140" fill="rgba(255,255,255,0.04)"/>
  <g transform="translate(300,270)">
    <line x1="-50" y1="50" x2="-50" y2="-40" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
    <line x1="50" y1="50" x2="50" y2="-40" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
    <ellipse cx="0" cy="50" rx="55" ry="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="-10" y="-40" width="20" height="90" rx="3" fill="url(#leaf)" filter="url(#shadow)"/>
    <rect x="-10" y="-40" width="20" height="25" rx="3" fill="rgba(255,255,255,0.15)"/>
  </g>
  <g transform="translate(300,410)" filter="url(#shadow)">
    <text x="0" y="0" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="28" fill="white" text-anchor="middle" letter-spacing="2">ROKOK SIN HERBAL</text>
    <text x="0" y="30" font-family="Arial,Helvetica,sans-serif" font-weight="300" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="4">ORIGINAL</text>
  </g>
  <g transform="translate(300,490)">
    <text x="0" y="0" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" text-anchor="middle">SKT • ROKOK HERBAL</text>
  </g>
</svg>