<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7e22ce"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.9)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.5)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)" rx="0"/>
  <circle cx="450" cy="130" r="180" fill="rgba(255,255,255,0.06)"/>
  <circle cx="150" cy="500" r="140" fill="rgba(255,255,255,0.04)"/>
  <g transform="translate(300,260)">
    <rect x="-25" y="-35" width="22" height="70" rx="8" fill="url(#leaf)" filter="url(#shadow)"/>
    <rect x="3" y="-35" width="22" height="70" rx="8" fill="rgba(255,255,255,0.6)" filter="url(#shadow)"/>
    <line x1="-14" y1="-20" x2="-14" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
    <line x1="14" y1="-20" x2="14" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  </g>
  <g transform="translate(300,400)" filter="url(#shadow)">
    <text x="0" y="0" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="28" fill="white" text-anchor="middle" letter-spacing="2">KAPSUL HERBAL SIN</text>
    <text x="0" y="28" font-family="Arial,Helvetica,sans-serif" font-weight="300" font-size="15" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">JAGA DAYA TAHAN TUBUH</text>
  </g>
  <g transform="translate(300,480)">
    <text x="0" y="0" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" text-anchor="middle">SUPLEMENT</text>
  </g>
</svg>