      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.9)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.5)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)" rx="0"/>
  <circle cx="450" cy="130" r="180" fill="rgba(255,255,255,0.06)"/>
  <circle cx="150" cy="500" r="140" fill="rgba(255,255,255,0.04)"/>
  <g transform="translate(300,270)" filter="url(#shadow)">
    <path d="M-8,-45 L8,-45 L12,-30 L12,50 L-12,50 L-12,-30 Z" fill="url(#bottle)"/>
    <rect x="-7" y="-30" width="14" height="15" rx="2" fill="rgba(255,255,255,0.15)"/>
    <line x1="0" y1="-10" x2="0" y2="35" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
    <path d="M-6,-40 L-6,-45 Q-6,-50 0,-50 Q6,-50 6,-45 L6,-40" fill="rgba(255,255,255,0.8)" stroke="none"/>
  </g>
  <g transform="translate(300,400)" filter="url(#shadow)">
    <text x="0" y="0" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="28" fill="white" text-anchor="middle" letter-spacing="2">MINYAK HERBAL SIN</text>
    <text x="0" y="28" font-family="Arial,Helvetica,sans-serif" font-weight="300" font-size="15" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">PIJAT &amp; TERAPI ALAMI</text>
  </g>
  <g transform="translate(300,480)">
    <text x="0" y="0" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" text-anchor="middle">MINYAK HERBAL</text>
